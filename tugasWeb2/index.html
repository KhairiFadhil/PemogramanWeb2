<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <div class="h-screen m-4 rounded-4xl flex flex-col relative overflow-hidden">
    <video class="absolute top-0 left-0 w-full h-full object-cover" autoplay muted loop playsinline>
      <source src="asset/hero.mp4" type="video/mp4">
    </video>
     <!-- Navbar    -->
    <div class="flex items-center justify-end gap-4 fixed top-8 right-10 z-20">
                <button class="group flex items-center justify-center bg-[#f1f1f1] gap-2 font-weight-[400] text-lg text-black px-4 py-2 font-family-int font-normal rounded-full transition-all duration-300 ease-out hover:-translate-y-0.5 hover:bg-white hover:shadow-md">
                    <img src="asset/plus.svg" alt="plus" class="w-4 h-4 transition-transform duration-300 ease-out group-hover:rotate-90">
                    <span class="transition-transform duration-300 ease-out group-hover:translate-x-0.5">Become a Client</span>
                </button>
                <div>
                    
                </div>
                <div class="relative" id="langDropdown">
                    <button id="langToggle" class="flex items-center justify-center gap-2 font-bold rounded-xl text-white bg-transparent border border-[#FFFFFF66] px-4 py-2 cursor-pointer">
                        <h1>EN</h1> 
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-down" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708"/>
                        </svg>
                    </button>
                    <div id="langMenu" class="absolute mt-2 top-10 w-full items-center justify-center gap-2 font-bold rounded-xl text-black bg-white border border-[#FFFFFF66] px-4 py-2 opacity-0 -translate-y-2 invisible pointer-events-none transition-all duration-200 ease-out">
                        <h1>CN</h1>    
                    </div>
                </div>
                <div class="group flex items-center justify-center rounded-full bg-[#f1f1f1]/60 p-2 w-12 h-12 transition-all duration-300 ease-out hover:-translate-y-0.5 hover:bg-[#f1f1f1]/80 hover:shadow-md cursor-pointer">
                    <svg class="w-6 h-6 text-white transition-transform duration-300 ease-out group-hover:scale-110" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M5 8H13.75M5 12H19M10.25 16L19 16" stroke="#464455" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
                </div>
    </div>
    <!-- Content -->
        <div class="flex shrink-0 items-center mx-6 justify-between relative z-10">
            <img src="asset/logo.svg" alt="logo" class="w-10 h-10">
            <div class="rounded-full flex items-center justify-center bg-white px-16 py-4 my-3 gap-12 font-semibold text-[15px]">
                <a class="transition-all duration-300 ease-out hover:-translate-y-0.5 hover:text-red-500">
                    About Us
                </a>
                <a class="transition-all duration-300 ease-out hover:-translate-y-0.5 hover:text-red-500">
                    Cases
                </a>
                <a class="transition-all duration-300 ease-out hover:-translate-y-0.5 hover:text-red-500">
                    Reviews
                </a>
                <a class="transition-all duration-300 ease-out hover:-translate-y-0.5 hover:text-red-500">
                    Contact Us
                </a>
            </div>
            <div class="flex items-center justify-center gap-2"></div>
        </div>
        <div class="flex flex-1 flex-col justify-end w-full mx-6 pb-8 relative z-10">
            <div class="w-full text-white max-w-md">
                    <h1 class="text-4xl font-normal leading-[.9]">WE CREATE</h1>
                    <h1 class="text-4xl font-bold leading-[.9] tracking-[-0.04em] whitespace-nowrap"><i>AWESOME</i></h1>
                    <h1 class="text-4xl font-bold leading-[.9]">DESIGN</h1>
            </div>
        </div>
  </div>
</body>
<script>
  const langDropdown = document.getElementById("langDropdown");
  const langToggle = document.getElementById("langToggle");
  const langMenu = document.getElementById("langMenu");

  function toggleLangMenu(show) {
    langMenu.classList.toggle("opacity-0", !show);
    langMenu.classList.toggle("-translate-y-2", !show);
    langMenu.classList.toggle("invisible", !show);
    langMenu.classList.toggle("pointer-events-none", !show);
    langMenu.classList.toggle("opacity-100", show);
    langMenu.classList.toggle("translate-y-0", show);
  }

  langToggle.addEventListener("click", function (event) {
    event.stopPropagation();
    const isOpen = langMenu.classList.contains("opacity-100");
    toggleLangMenu(!isOpen);
  });

  document.addEventListener("click", function (event) {
    if (!langDropdown.contains(event.target)) {
      toggleLangMenu(false);
    }
  });
</script>
</html>
