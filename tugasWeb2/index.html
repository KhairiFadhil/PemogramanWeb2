<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero-shell">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="asset/hero.mp4" type="video/mp4">
    </video>

    <div class="nav-bar">
      <button class="nav-button-client">
        <img src="asset/plus.svg" alt="plus" class="nav-button-client-icon">
        <span class="nav-button-client-label">Become a Client</span>
      </button>

      <div class="bahasa-dropdown" id="langDropdown">
        <button id="langToggle" class="bahasa-toggle">
          <span>EN</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708"/>
          </svg>
        </button>
        <div id="langMenu" class="bahasa-menu">
          <span>CN</span>
        </div>
      </div>

      <div class="menu-circle">
        <svg class="menu-circle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M5 8H13.75M5 12H19M10.25 16L19 16" stroke="#464455" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
      </div>
    </div>

    <div class="main-nav-wrap">
      <img src="asset/logo.svg" alt="logo" class="logo">
      <div class="main-nav">
        <a href="" class="main-nav-link">About Us</a>
        <a href="" class="main-nav-link">Cases</a>
        <a href="" class="main-nav-link">Reviews</a>
        <a href="" class="main-nav-link">Contact Us</a>
      </div>
      <div></div>
    </div>

    <div class="hero-content">
      <div class="hero-title">
        <h1 class="title-line title-light">WE CREATE</h1>
        <h1 class="title-line title-bold"><i>AWESOME</i></h1>
        <h1 class="title-line title-bold">DESIGN</h1>
      </div>
    </div>
  </div>
</body>
<script>
  const langDropdown = document.getElementById("langDropdown");
  const langToggle = document.getElementById("langToggle");
  const langMenu = document.getElementById("langMenu");

  langToggle.addEventListener("click", function (event) {
    event.stopPropagation();
    langMenu.classList.toggle("open");
  });

  document.addEventListener("click", function (event) {
    if (!langDropdown.contains(event.target)) {
      langMenu.classList.remove("open");
    }
  });
</script>
</html>
